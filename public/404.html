<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página não encontrada | Monac ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --monac-blue: #0047BB;
      --monac-ink: #101820;
      --monac-paper: #F2F0EB;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--monac-paper);
      color: var(--monac-ink);
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Grid sutil — assinatura visual Monac */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(16,24,32,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,24,32,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Logo no topo */
    .logo {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .logo-name {
      font-family: 'Century Gothic', Futura, 'Trebuchet MS', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--monac-ink);
    }

    /* Número 404 — Glacial Indifference / sem bold */
    .error-code {
      font-family: 'Century Gothic', Futura, 'Trebuchet MS', sans-serif;
      font-weight: 300;
      font-size: clamp(7rem, 22vw, 14rem);
      line-height: 1;
      color: var(--monac-blue);
      opacity: 0.15;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    /* Label de seção — padrão Monac */
    .label {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--monac-blue);
      display: block;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Century Gothic', Futura, 'Trebuchet MS', sans-serif;
      font-weight: 700;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      color: var(--monac-ink);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    p {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(16,24,32,0.55);
      margin-bottom: 2.5rem;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 2rem;
      height: 3rem;
      background-color: var(--monac-blue);
      color: #fff;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border-radius: 0.75rem;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(0,71,187,0.25);
    }

    a.btn:hover {
      background-color: #003388;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,71,187,0.35);
    }

    /* Seta SVG inline */
    .arrow {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>

  <!-- Logo Monac -->
  <a href="/" class="logo">
    <img src="/favicon-monac.png" alt="Monac" />
    <span class="logo-name">Monac</span>
  </a>

  <!-- Número 404 decorativo ao fundo -->
  <div class="error-code" aria-hidden="true">404</div>

  <!-- Conteúdo principal -->
  <div class="content">
    <span class="label">Erro 404</span>
    <h1>Página não encontrada</h1>
    <p>
      Parece que você saiu do mapa. Mas não se preocupe —
      no Monac nenhum dado se perde. Vamos te levar de volta ao início.
    </p>
    <a href="/" class="btn">
      Voltar ao início
      <svg class="arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
      </svg>
    </a>
  </div>

</body>
</html>
